services:
  postgres:
    image: postgres:17.5-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    ports:
      - "5432:5432"
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - spark-network
    restart: always

  minio:
    image: quay.io/minio/minio:RELEASE.2025-06-13T11-33-47Z
    container_name: minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL}
      TZ: ${TZ}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio-data-volume:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/minio/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - spark-network
    restart: unless-stopped

  minio-init:
    image: quay.io/minio/mc
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb myminio/warehouse || true;
      mc mb myminio/logs || true;
      exit 0;
      "
    networks:
      - spark-network

  nessie:
    image: projectnessie/nessie:latest
    container_name: nessie
    environment:
      NESSIE_SERVER_LISTEN_PORT_REQUEST: 19120
      NESSIE_VERSION_STORE_PERSISTENCE: JDBC
      NESSIE_VERSION_STORE_JDBC_CONNECTION_URL: "jdbc:postgresql://postgres:5432/${NESSIE_DB}"
      NESSIE_VERSION_STORE_JDBC_USERNAME: "${POSTGRES_USER}"
      NESSIE_VERSION_STORE_JDBC_PASSWORD: "${POSTGRES_PASSWORD}"
      NESSIE_CATALOG_DEFAULT_WAREHOUSE: "s3://warehouse"
      NESSIE_CATALOG_S3_ENDPOINT: "http://minio:9000"
      NESSIE_CATALOG_S3_ACCESS_KEY: "${MINIO_ROOT_USER}"
      NESSIE_CATALOG_S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD}"
      NESSIE_CATALOG_S3_PATH_STYLE_ACCESS: "true"
      TZ: ${TZ}
    ports:
      - "19120:19120"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:19120/api/v2/config"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - spark-network
    restart: unless-stopped

  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      SPARK_USER: spark
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./spark/config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./spark/config/spark-env.sh:/opt/spark/conf/spark-env.sh:ro
      - ./spark/config/log4j2.properties:/opt/spark/conf/log4j2.properties:ro
      - ./spark/jobs:/opt/spark-apps
      - spark-master-logs:/opt/spark/logs
      - spark-master-data:/opt/spark/data
    depends_on:
      minio-init:
        condition: service_completed_successfully
      nessie:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - spark-network
    restart: unless-stopped

  spark-worker-1:
    image: apache/spark:3.5.0
    container_name: spark-worker-1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      SPARK_USER: spark
    ports:
      - "8081:8081"
    volumes:
      - ./spark/config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./spark/config/spark-env.sh:/opt/spark/conf/spark-env.sh:ro
      - ./spark/config/log4j2.properties:/opt/spark/conf/log4j2.properties:ro
      - spark-worker-1-logs:/opt/spark/logs
      - spark-worker-1-data:/opt/spark/data
    depends_on:
      spark-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - spark-network
    restart: unless-stopped

  spark-worker-2:
    image: apache/spark:3.5.0
    container_name: spark-worker-2
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      SPARK_USER: spark
    ports:
      - "8082:8081"
    volumes:
      - ./spark/config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./spark/config/spark-env.sh:/opt/spark/conf/spark-env.sh:ro
      - ./spark/config/log4j2.properties:/opt/spark/conf/log4j2.properties:ro
      - spark-worker-2-logs:/opt/spark/logs
      - spark-worker-2-data:/opt/spark/data
    depends_on:
      spark-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - spark-network
    restart: unless-stopped

  spark-worker-3:
    image: apache/spark:3.5.0
    container_name: spark-worker-3
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      SPARK_USER: spark
    ports:
      - "8083:8081"
    volumes:
      - ./spark/config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./spark/config/spark-env.sh:/opt/spark/conf/spark-env.sh:ro
      - ./spark/config/log4j2.properties:/opt/spark/conf/log4j2.properties:ro
      - spark-worker-3-logs:/opt/spark/logs
      - spark-worker-3-data:/opt/spark/data
    depends_on:
      spark-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - spark-network
    restart: unless-stopped

  dremio:
    image: dremio/dremio-oss:latest
    container_name: dremio
    environment:
      TZ: ${TZ}
    ports:
      - "${DREMIO_PORT}:9047"
      - "31010:31010"
      - "45678:45678"
    volumes:
      - ./dremio/dremio.conf:/opt/dremio/conf/dremio.conf:ro
      - dremio-data-volume:/var/lib/dremio
    depends_on:
      nessie:
        condition: service_healthy
      spark-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9047/apiv2/config"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - spark-network
    restart: unless-stopped

networks:
  spark-network:
    driver: bridge

volumes:
  postgres-db-volume:
  minio-data-volume:
  spark-master-logs:
  spark-master-data:
  spark-worker-1-logs:
  spark-worker-1-data:
  spark-worker-2-logs:
  spark-worker-2-data:
  spark-worker-3-logs:
  spark-worker-3-data:
  dremio-data-volume:
