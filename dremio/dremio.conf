# Dremio Configuration File for Nessie + Iceberg Integration

paths {
  # The directory where Dremio will store its database
  db: "/var/lib/dremio"
  results: "/var/lib/dremio/results"
  scratch: "/var/lib/dremio/scratch"
}

services {
  coordinator.enabled: true
  coordinator.master.enabled: true
  executor.enabled: false
}

provisioner {
  port: 8047
}

services.executor {
  cache_volume_size: 536870912
}

services.coordinator {
  cache_volume_size: 536870912
}

# Enable arrow caching
cache:
  enabled: true

# Configure memory
registration.publish_host: "dremio"
cache.volume_size: 536870912

# Execution settings
exec {
  max_db_query_complexity: 1000
  include_dataset_profile: true
}

# Arrow cache and memory
cache {
  enabled: true
}

# Nessie source configuration (defined in dremio.conf)
# Note: Actual Nessie source connections are typically configured via the Web UI
# or via API after startup, though they can also be pre-configured here.
# 
# To add a Nessie source, you would typically:
# 1. Start Dremio
# 2. Go to the UI (http://localhost:9047)
# 3. Add a new data source
# 4. Select Nessie from the options
# 5. Configure the connection details:
#    - URI: http://nessie:19120/api/v2
#    - Warehouse Path: s3://warehouse
#    - AWS S3 access key and secret
#
# For production, these could be added as environment variables or
# via the REST API before starting the Web UI.
