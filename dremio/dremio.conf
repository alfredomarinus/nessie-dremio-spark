# Minimal Dremio Configuration File for Nessie + Iceberg Integration

paths {
  db: "/var/lib/dremio"
}

services {
  coordinator.enabled: true
  coordinator.master.enabled: true
  executor.enabled: false
}

# Note: Nessie source connections are configured via the Web UI after startup:
# 1. Go to http://localhost:9047
# 2. Log in with dremio / dremio123
# 3. Click "+" next to "Sources"
# 4. Select "Nessie"
# 5. Configure:
#    - Name: nessie
#    - Nessie URL: http://nessie:19120/api/v2
#    - Warehouse Location: s3://warehouse
#    - Access Key ID: minioadmin
#    - Access Secret: minioadmin
