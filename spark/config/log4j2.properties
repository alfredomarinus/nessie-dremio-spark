# Spark Job Logging Configuration (log4j2)
rootLogger.level = INFO
rootLogger.appenderRef.console.ref = STDOUT

appender.console.type = Console
appender.console.name = STDOUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{ISO8601} [%t] %p %c{1.} - %m%n

# Reduce verbosity for specific packages
logger.hadoop.name = org.apache.hadoop
logger.hadoop.level = WARN

logger.hive.name = org.apache.hive
logger.hive.level = WARN

logger.spark.name = org.apache.spark
logger.spark.level = INFO
