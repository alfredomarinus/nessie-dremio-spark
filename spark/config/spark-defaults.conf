# Spark Configuration with Nessie/Iceberg and MinIO support

# RPC and Network Configuration
spark.master                                   spark://spark-master:7077
spark.driver.host                              spark-master
spark.driver.bindAddress                       0.0.0.0

# Memory and Executor Configuration
spark.driver.memory                            2g
spark.executor.memory                          2g
spark.executor.cores                           2
spark.executor.instances                       2

# S3 / MinIO Configuration
spark.hadoop.fs.s3a.endpoint                  http://minio:9000
spark.hadoop.fs.s3a.access.key                minioadmin
spark.hadoop.fs.s3a.secret.key                minioadmin
spark.hadoop.fs.s3a.path.style.access        true
spark.hadoop.fs.s3a.connection.ssl.enabled   false
spark.hadoop.fs.s3a.attempts.maximum         10
spark.hadoop.fs.s3a.connection.timeout       200000
spark.jars.packages                           org.apache.hadoop:hadoop-aws:3.3.4,org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.4.0,org.projectnessie.integrations:nessie-spark-extensions:1.0.0

# Nessie/Iceberg Catalog Configuration
spark.sql.catalog.nessie                      org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.nessie.catalog-impl         org.projectnessie.iceberg.core.IcebergCatalogImpl
spark.sql.catalog.nessie.warehouse           s3a://warehouse
spark.sql.catalog.nessie.uri                 http://nessie:19120/api/v2
spark.sql.catalog.nessie.ref                 main

# Event Logging
spark.eventLog.enabled                        true
spark.eventLog.dir                            /opt/spark/logs
spark.eventLog.compress                       false

# Shuffle Configuration
spark.shuffle.service.enabled                 false
spark.sql.adaptive.enabled                    true
spark.sql.adaptive.coalescePartitions.enabled true

# Serialization
spark.serializer                              org.apache.spark.serializer.KryoSerializer
spark.kryoserializer.buffer.max              256m

# SQL Configuration
spark.sql.shuffle.partitions                  200
spark.sql.legacy.timeParserPolicy            CORRECTED

# Iceberg Configuration
spark.sql.extensions                          org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions,org.projectnessie.spark.extensions.NessieSparkSessionExtensions
spark.sql.defaultCatalog                      nessie

# Logging
spark.driver.log.level                        INFO
